networks:
    local:
        driver: bridge
volumes:
    bind9_cache:
        driver: local
    bind9_lib:
        driver: local
    bind9_src:
        driver: local
    pihole:
        driver: local
services:
    bind9:
        extends:
            file: $TEMPLATE_DNS
            service: bind9 
        volumes:
            - bind9_src:/etc/bind
            - bind9_cache:/var/cache/bind
            - bind9_lib:/var/lib/bind
        networks:
            - local
        restart: unless-stopped
    pihole:
        extends:
            file: $TEMPLATE_DNS
            service: pihole
        volumes:
            - pihole:/etc/pihole
        networks:
            - local
        depends_on:
            - bind9
        restart: unless-stopped
