services:
    console:
        image: lscr.io/linuxserver/unifi-network-application:latest
        environment:
            PUID: $CONSOLE_PUID
            PGID: $CONSOLE_PGID
            TZ: $CONSOLE_TZ
            MONGO_USER: $CONSOLE_MONGO_USER
            MONGO_PASS: $CONSOLE_MONGO_PASS
            MONGO_HOST: $CONSOLE_MONGO_HOST
            MONGO_PORT: $CONSOLE_MONGO_PORT
            MONGO_DBNAME: $CONSOLE_MONGO_DBNAME
            MONGO_AUTHSOURCE: $CONSOLE_MONGO_AUTHSOURCE
            MEM_LIMIT: $CONSOLE_MEM_LIMIT
            MEM_STARTUP: $CONSOLE_MEM_STARTUP
            # MONGO_TLS: $CONSOLE_MONGO_TLS
    db:
        image: mongo:latest
        environment:
            MONGO_INITDB_ROOT_USERNAME: $DB_MONGO_INITDB_ROOT_USERNAME
            MONGO_INITDB_ROOT_PASSWORD: $DB_MONGO_INITDB_ROOT_PASSWORD
            MONGO_USER: $DB_MONGO_USER
            MONGO_PASS: $DB_MONGO_PASS
            MONGO_DBNAME: $DB_MONGO_DBNAME
            MONGO_AUTHSOURCE: $DB_MONGO_AUTHSOURCE

